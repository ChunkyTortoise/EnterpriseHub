name: Nightly Eval Regression
on:
  schedule:
    - cron: '0 2 * * *' # 2am UTC daily
  workflow_dispatch: # manual trigger
permissions:
  contents: write # publish step commits evals/latest_results.json + badge
  issues: write # regression alert opens an issue
jobs:
  regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest-json-report
      - name: Run eval suite
        run: python3 -m pytest tests/test_eval_harness.py -v --tb=short --override-ini="addopts=" --json-report --json-report-file=eval-results.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      # Publish before the compare gate and with if: always() so a regression
      # night updates the badge to red instead of leaving a stale green one.
      - name: Publish results badge and README table
        if: always()
        run: |
          python3 evals/render_results_table.py eval-results.json README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/latest_results.json evals/badge.json README.md
          git diff --cached --quiet || git commit -m "chore(evals): publish nightly results [skip ci]"
          git push
      - name: Compare against baseline
        run: python3 evals/compare_baseline.py eval-results.json evals/baseline.json
      - name: Alert on regression
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "[Regression] Nightly eval score dropped",
              body: "The nightly eval suite detected a quality regression. Check the workflow run for details.",
              labels: ["regression", "eval"]
            });
