name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run ruff check
      run: ruff check .

    - name: Run ruff format check
      run: ruff format --check .

    - name: Parse gate (py_compile)
      run: python3 scripts/ci/compile_check.py

    - name: No mock in production v2 routes
      run: python3 scripts/ci/no_mock_in_prod.py

    - name: Revenue ops artifact QA
      run: python3 scripts/ci/revenue_ops_qa.py

    - name: Generate weekly KPI CSV from outcome events
      run: python3 scripts/generate_weekly_pilot_kpis.py

    - name: Render weekly executive proof-pack
      run: python3 scripts/generate_weekly_executive_proof_pack.py --tenant-id tenant_demo

    - name: Smoke-check pilot data persistence script (DB-independent)
      run: python3 scripts/persist_revenue_pilot_data.py --dry-run --events reports/outcome_events.jsonl --kpis reports/weekly_pilot_kpis.csv

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install system dependencies
      run: |
        sudo apt-get update

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run unit tests (ghl_real_estate_ai/tests/unit/)
      env:
        ANTHROPIC_API_KEY: sk-test-key-for-ci-only
        GHL_API_KEY: test-ghl-key-for-ci-only
        GHL_LOCATION_ID: test-location-id-for-ci-only
      run: |
        pytest ghl_real_estate_ai/tests/unit/ -m unit --override-ini="addopts=" --cov=ghl_real_estate_ai --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -v

    - name: Run extended unit tests (tests/unit/)
      env:
        ANTHROPIC_API_KEY: sk-test-key-for-ci-only
        GHL_API_KEY: test-ghl-key-for-ci-only
        GHL_LOCATION_ID: test-location-id-for-ci-only
      run: |
        pytest tests/unit/ --override-ini="addopts=" --cov=ghl_real_estate_ai --cov-append --cov-report=xml --cov-report=term-missing --cov-fail-under=0 --tb=short -q

    - name: Run agent tests (tests/agents/)
      env:
        ANTHROPIC_API_KEY: sk-test-key-for-ci-only
        GHL_API_KEY: test-ghl-key-for-ci-only
        GHL_LOCATION_ID: test-location-id-for-ci-only
      run: |
        pytest tests/agents/ --override-ini="addopts=" --cov=ghl_real_estate_ai --cov-append --cov-report=xml --cov-report=term-missing --cov-fail-under=0 --tb=short -q --ignore=tests/agents/test_buyer_bot.py --ignore=tests/agents/test_buyer_response_generator_regressions.py

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-unit-${{ matrix.python-version }}
        fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit]

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET_KEY: test-jwt-secret-key-for-integration-testing-only
      STRIPE_WEBHOOK_SECRET: whsec_test_fake_secret_for_integration

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-

    - name: Install system dependencies
      run: |
        sudo apt-get update

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run integration tests
      env:
        ANTHROPIC_API_KEY: sk-test-key-for-ci-only
        GHL_API_KEY: test-ghl-key-for-ci-only
        GHL_LOCATION_ID: test-location-id-for-ci-only
      run: |
        pytest -m integration -v --tb=short

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pip-audit

    - name: Bandit security scan (high severity)
      run: bandit -r ghl_real_estate_ai -x tests -ll -q

    - name: Check for f-string SQL injection patterns
      run: |
        if grep -rn 'execute(f".*SELECT\|execute(f".*INSERT\|execute(f".*UPDATE\|execute(f".*DELETE' ghl_real_estate_ai/ --include="*.py" | grep -v "_quote_ident\|quote_identifier\|quoted_\|safe_pragma"; then
          echo "ERROR: Unprotected f-string SQL found! Use quote_identifier() from utils.sql_safety"
          exit 1
        fi
        echo "No unprotected f-string SQL found."

    - name: Dependency vulnerability scan
      run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-162 || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run mypy
      run: mypy ghl_real_estate_ai src utils advanced_rag_system

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test-unit]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify app can be imported
      run: python -c "import app; print('App imported successfully')"

    - name: Verify modules can be imported
      run: |
        python -c "from utils import data_loader; print('data_loader imported successfully')"
